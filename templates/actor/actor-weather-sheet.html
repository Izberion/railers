<form class="{{cssClass}} {{actor.type}} grid grid-4col" autocomplete="off">
  <div class="toggle grid-span-4">
    {{radioBoxes "system.season" seasons checked=system.season localize=true}}
    <button class="rollSeason">{{localize "RAILERS.RollTemp"}}</button>
    <input type="checkbox" name="system.integrate" {{checked system.integrate}}>
    <label for="system.integrate">{{localize "RAILERS.TempIntegrate"}}</label>
  </div>
    <div class="flower">
      <div class="d12hex-wrapper">
        <div class="face top">12</div>
        <div class="face right-top">2</div>
        <div class="face right-bottom">4</div>
        <div class="face bottom">6</div>
        <div class="face left-bottom">8</div>
        <div class="face left-top">10</div>
        <div class="d12hex">
          <img src="systems/railers/assets/tiles/flathex.svg">
          <div class="inner">1d12</div>
        </div>
      </div>
    </div>
  
    <div class="flower grid-span-3">
      <div class="hex-column">
        <div class="hex" data-coordinates="(0,0)"><img src="systems/railers/assets/weather/thundersnowhex.svg"></div>
        <div class="hex" data-coordinates="(0,1)"><img src="systems/railers/assets/weather/snowstormhex.svg"></div>
        <div class="hex" data-coordinates="(0,2)"><img src="systems/railers/assets/weather/blizzardhex.svg"></div>
      </div>
  
      <div class="hex-column">
        <div class="hex" data-coordinates="(1,0)"><img src="systems/railers/assets/weather/windhex.svg"></div>
        <div class="hex" data-coordinates="(1,1)"><img src="systems/railers/assets/weather/flurryhex.svg"></div>
        <div class="hex" data-coordinates="(1,2)"><img src="systems/railers/assets/weather/overcasthex.svg"></div>
        <div class="hex" data-coordinates="(1,3)"><img src="systems/railers/assets/weather/polaroutbreakhex.svg"></div>
      </div>
  
      <div class="hex-column">
        <div class="hex" data-coordinates="(2,0)"><img src="systems/railers/assets/weather/aurorahex.svg"></div>
        <div class="hex" data-coordinates="(2,1)"><img src="systems/railers/assets/weather/clearhex.svg"></div>
        <div class="hex" data-coordinates="(2,2)"><img src="systems/railers/assets/weather/clearhex.svg"></div>
        <div class="hex" data-coordinates="(2,3)"><img src="systems/railers/assets/weather/clearhex.svg"></div>
        <div class="hex" data-coordinates="(2,4)"><img src="systems/railers/assets/weather/icefoghex.svg"></div>
      </div>
  
      <div class="hex-column">
        <div class="hex" data-coordinates="(3,0)"><img src="systems/railers/assets/weather/blizzardhex.svg"></div>
        <div class="hex" data-coordinates="(3,1)"><img src="systems/railers/assets/weather/overcasthex.svg"></div>
        <div class="hex" data-coordinates="(3,2)"><img src="systems/railers/assets/weather/flurryhex.svg"></div>
        <div class="hex" data-coordinates="(3,3)"><img src="systems/railers/assets/weather/windhex.svg"></div>
      </div>
  
      <div class="hex-column">
        <div class="hex" data-coordinates="(4,0)"><img src="systems/railers/assets/weather/diamonddusthex.svg"></div>
        <div class="hex" data-coordinates="(4,1)"><img src="systems/railers/assets/weather/snowstormhex.svg"></div>
        <div class="hex" data-coordinates="(4,2)"><img src="systems/railers/assets/weather/whiteouthex.svg"></div>
      </div>
    </div>
  </form>
