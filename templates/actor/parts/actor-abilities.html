  {{!-- Item List --}}
  <ol class="items-list">
    <li class="item flexrow items-header">
      <div class="item-name">Name</div>
      <div class="ability-action">Action</div>
      <div class="ability-controls">
        <a class="ability-control item-create" title="Create item" data-type="ability"><i class="fas fa-plus"></i> Add item</a>
      </div>
    </li>
    {{#each items as |item id|}}
      {{#if (eq item.type "ability")}}
      <li class="item flexrow" data-item-id="{{item._id}}">
        <div class="item-name">
          <div class="item-image">
            <a class="rollable" data-roll-type="item"><img src="{{item.img}}" title="{{item.name}}" width="24" height="24"/></a>
          </div>
          <h4>{{item.name}}</h4>
        </div>
        <div class="ability-action textcenter">{{item.system.action}}</div>
        <div class="ability-controls">
          <a class="ability-control item-edit" title="Edit Item"><i class="fas fa-edit"></i></a>
          <a class="ability-control item-delete" title="Delete Item"><i class="fas fa-trash"></i></a>
        </div>
      </li>
      {{/if}}
    {{/each}}
  </ol>
